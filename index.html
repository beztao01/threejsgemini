<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador GLB - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>

    <!-- Importamos Three.js y OrbitControls desde un CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. Escena, Cámara y Renderizador
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xaaaaaa); // Fondo gris claro para contrastar

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping; // Mejora el color del modelo
        document.body.appendChild(renderer.domElement);

        // 2. Controles de órbita (Permite rotar 360° libremente)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Suaviza el movimiento

        // 3. Iluminación
        const ambientLight = new THREE.AmbientLight(0xffffff, 1);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        // 4. Cargar el modelo GLB
        const loader = new GLTFLoader();
        loader.load(
            '.asset/modelo.glb', // Reemplaza esto con la ruta de tu archivo .glb
            function (gltf) {
                const model = gltf.scene;
                
                // Centrar el modelo automáticamente en la escena
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center); 
                
                scene.add(model);
            },
            function (xhr) {
                console.log((xhr.loaded / xhr.total * 100) + '% cargado');
            },
            function (error) {
                console.error('Ocurrió un error al cargar el modelo:', error);
            }
        );

        // 5. Ajustar al cambiar el tamaño de la ventana
        window.addEventListener('resize', onWindowResize, false);

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 6. Bucle de Animación
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Necesario para el suavizado (damping)
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
